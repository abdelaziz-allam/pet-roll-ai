name: petroll
description: PET Roll — Pet health management, breeding & community app.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'
  flutter: '>=3.24.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.6

  # State Management
  flutter_riverpod: ^2.5.0
  riverpod_annotation: ^2.3.0

  # Navigation
  go_router: ^14.0.0

  # Network
  dio: ^5.4.0

  # Firebase
  firebase_core: ^3.0.0
  firebase_auth: ^5.0.0
  firebase_messaging: ^15.0.0
  cloud_firestore: ^5.0.0
  firebase_storage: ^12.0.0

  # Local Storage
  hive_flutter: ^1.1.0
  hive: ^2.2.0
  shared_preferences: ^2.2.0
  flutter_secure_storage: ^9.0.0

  # UI
  cached_network_image: ^3.3.0
  flutter_svg: ^2.0.0
  shimmer: ^3.0.0
  fl_chart: ^0.68.0
  lottie: ^3.0.0

  # Forms & Validation
  reactive_forms: ^17.0.0

  # Images
  image_picker: ^1.0.0
  image_cropper: ^7.0.0

  # PDF
  pdf: ^3.10.0
  printing: ^5.12.0
  path_provider: ^2.1.0

  # Push Notifications
  flutter_local_notifications: ^17.0.0

  # Auth
  google_sign_in: ^6.2.0
  sign_in_with_apple: ^6.0.0

  # Utilities
  timeago: ^3.6.0
  intl: ^0.20.2
  url_launcher: ^6.2.0
  share_plus: ^9.0.0
  package_info_plus: ^8.0.0
  connectivity_plus: ^6.0.0
  permission_handler: ^11.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  riverpod_generator: ^2.4.0
  build_runner: ^2.4.0
  hive_generator: ^2.0.0
  json_serializable: ^6.7.0
  json_annotation: ^4.8.0

flutter:
  uses-material-design: true

  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Thin.ttf
          weight: 100
        - asset: assets/fonts/Poppins-ExtraLight.ttf
          weight: 200
        - asset: assets/fonts/Poppins-Light.ttf
          weight: 300
        - asset: assets/fonts/Poppins-Regular.ttf
          weight: 400
        - asset: assets/fonts/Poppins-Medium.ttf
          weight: 500
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700
        - asset: assets/fonts/Poppins-ExtraBold.ttf
          weight: 800
        - asset: assets/fonts/Poppins-Black.ttf
          weight: 900

  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
    - assets/onboarding/
