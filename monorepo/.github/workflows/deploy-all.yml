name: Deploy All (Full Stack)

on:
  workflow_dispatch:
    inputs:
      skip_infra:
        description: 'Skip infrastructure provisioning'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

env:
  PROJECT_ID: petroll-production
  REGION: europe-north1
  REGISTRY: europe-north1-docker.pkg.dev/petroll-production/petroll-images
  WIF_PROVIDER: projects/834040996278/locations/global/workloadIdentityPools/github-pool/providers/github-provider
  SERVICE_ACCOUNT: github-actions-deploy@petroll-production.iam.gserviceaccount.com

jobs:
  infrastructure:
    if: inputs.skip_infra == 'false'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    environment: production
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: ${{ env.SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Bootstrap GCP prerequisites
        run: |
          gcloud config set project ${{ env.PROJECT_ID }}

          gcloud services enable \
            run.googleapis.com \
            artifactregistry.googleapis.com \
            cloudbuild.googleapis.com \
            firestore.googleapis.com \
            firebase.googleapis.com \
            secretmanager.googleapis.com \
            iam.googleapis.com \
            cloudresourcemanager.googleapis.com \
            storage.googleapis.com

          gsutil mb -p ${{ env.PROJECT_ID }} -l ${{ env.REGION }} gs://petroll-terraform-state 2>/dev/null || echo "State bucket exists"
          gsutil versioning set on gs://petroll-terraform-state

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '1.7.0'

      - name: Terraform Init & Apply
        working-directory: infra/terraform
        run: |
          terraform init
          terraform apply -auto-approve

      - name: Show infrastructure outputs
        working-directory: infra/terraform
        run: terraform output

  deploy-backend:
    runs-on: ubuntu-latest
    needs: [infrastructure]
    if: always() && (needs.infrastructure.result == 'success' || needs.infrastructure.result == 'skipped')
    permissions:
      contents: read
      id-token: write
    environment: production

    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: ${{ env.SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build and Push Backend
        working-directory: backend
        run: |
          IMAGE=${{ env.REGISTRY }}/backend:${{ github.sha }}
          IMAGE_LATEST=${{ env.REGISTRY }}/backend:latest

          docker build \
            -f ../docker/Dockerfile.backend \
            --target production \
            -t $IMAGE \
            -t $IMAGE_LATEST \
            .

          docker push $IMAGE
          docker push $IMAGE_LATEST

      - name: Deploy Backend to Cloud Run
        run: |
          gcloud run deploy petroll-api \
            --image ${{ env.REGISTRY }}/backend:${{ github.sha }} \
            --region ${{ env.REGION }} \
            --platform managed \
            --allow-unauthenticated \
            --service-account petroll-cloudrun@${{ env.PROJECT_ID }}.iam.gserviceaccount.com \
            --set-env-vars "NODE_ENV=production,PORT=3000,GCP_PROJECT_ID=${{ env.PROJECT_ID }},CORS_ORIGINS=https://admin.petroll.site,https://petroll.site" \
            --set-secrets "JWT_SECRET=jwt-secret:latest" \
            --min-instances 0 \
            --max-instances 2 \
            --memory 512Mi \
            --cpu 1 \
            --timeout 60 \
            --concurrency 80 \
            --cpu-throttling \
            --quiet

      - name: Get Backend URL
        id: backend-url
        run: |
          URL=$(gcloud run services describe petroll-api --region ${{ env.REGION }} --format='value(status.url)')
          echo "url=$URL" >> $GITHUB_OUTPUT
          echo "Backend deployed to: $URL"

    outputs:
      backend_url: ${{ steps.backend-url.outputs.url }}

  deploy-admin:
    runs-on: ubuntu-latest
    needs: [deploy-backend]
    permissions:
      contents: read
      id-token: write
    environment: production

    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: ${{ env.SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build and Push Admin
        working-directory: admin
        run: |
          IMAGE=${{ env.REGISTRY }}/admin:${{ github.sha }}
          IMAGE_LATEST=${{ env.REGISTRY }}/admin:latest

          API_URL="${{ needs.deploy-backend.outputs.backend_url }}/api/v1"

          docker build \
            -f ../docker/Dockerfile.admin \
            --target production \
            --build-arg VITE_API_URL=$API_URL \
            -t $IMAGE \
            -t $IMAGE_LATEST \
            .

          docker push $IMAGE
          docker push $IMAGE_LATEST

      - name: Deploy Admin to Cloud Run
        run: |
          gcloud run deploy petroll-admin \
            --image ${{ env.REGISTRY }}/admin:${{ github.sha }} \
            --region ${{ env.REGION }} \
            --platform managed \
            --allow-unauthenticated \
            --min-instances 0 \
            --max-instances 1 \
            --memory 256Mi \
            --cpu 1 \
            --timeout 30 \
            --cpu-throttling \
            --quiet

      - name: Output Service URL
        run: |
          URL=$(gcloud run services describe petroll-admin --region ${{ env.REGION }} --format='value(status.url)')
          echo "Admin Portal deployed to: $URL"

  deploy-landing:
    runs-on: ubuntu-latest
    needs: [infrastructure]
    if: always() && (needs.infrastructure.result == 'success' || needs.infrastructure.result == 'skipped')
    permissions:
      contents: read
      id-token: write
    environment: production

    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: ${{ env.SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Create Dockerfile and nginx config
        working-directory: landing
        run: |
          cat > Dockerfile << 'DOCKERFILE'
          FROM node:20-slim AS build
          WORKDIR /app
          COPY package.json package-lock.json* ./
          RUN npm ci
          COPY . .
          RUN npm run build

          FROM nginx:alpine
          COPY --from=build /app/dist /usr/share/nginx/html
          COPY nginx.conf /etc/nginx/conf.d/default.conf
          EXPOSE 80
          CMD ["nginx", "-g", "daemon off;"]
          DOCKERFILE

          cat > nginx.conf << 'NGINX'
          server {
              listen 80;
              server_name _;
              root /usr/share/nginx/html;
              index index.html;
              location / {
                  try_files $uri $uri/ /index.html;
              }
              gzip on;
              gzip_types text/plain text/css application/json application/javascript text/xml;
          }
          NGINX

      - name: Build and Push
        working-directory: landing
        run: |
          IMAGE=${{ env.REGISTRY }}/landing:${{ github.sha }}
          docker build -t $IMAGE -t ${{ env.REGISTRY }}/landing:latest .
          docker push $IMAGE
          docker push ${{ env.REGISTRY }}/landing:latest

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy petroll-landing \
            --image ${{ env.REGISTRY }}/landing:${{ github.sha }} \
            --region ${{ env.REGION }} \
            --platform managed \
            --allow-unauthenticated \
            --min-instances 0 \
            --max-instances 1 \
            --memory 128Mi \
            --cpu 1 \
            --cpu-throttling \
            --quiet

      - name: Output Service URL
        run: |
          URL=$(gcloud run services describe petroll-landing --region ${{ env.REGION }} --format='value(status.url)')
          echo "Landing Page deployed to: $URL"

  summary:
    runs-on: ubuntu-latest
    needs: [deploy-backend, deploy-admin, deploy-landing]
    if: always()
    steps:
      - name: Deployment Summary
        run: |
          echo "============================================"
          echo "  PET Roll Deployment Complete"
          echo "  Region: europe-north1 (Finland)"
          echo "============================================"
          echo ""
          echo "Backend API: ${{ needs.deploy-backend.outputs.backend_url }}"
          echo ""
          echo "Check Cloud Run console for all service URLs:"
          echo "https://console.cloud.google.com/run?project=petroll-production"
