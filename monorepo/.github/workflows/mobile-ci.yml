name: Mobile App CI

on:
  push:
    branches: [main]
    paths: ['app/**', '.github/workflows/mobile-ci.yml']
  pull_request:
    branches: [main]
    paths: ['app/**']

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
          cache: true

      - name: Get dependencies
        working-directory: app
        run: flutter pub get

      - name: Analyze
        working-directory: app
        run: flutter analyze --no-fatal-infos || true

  build-android:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    needs: analyze

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
          cache: true

      - name: Get dependencies
        working-directory: app
        run: flutter pub get

      - name: Decode keystore
        working-directory: app
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE }}" | base64 -d > android/app/petroll-release.jks
          cat > android/key.properties << EOF
          storePassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          keyAlias=petroll-key
          storeFile=petroll-release.jks
          EOF

      - name: Build APK
        working-directory: app
        run: |
          flutter build apk --release \
            --dart-define=API_BASE_URL=${{ secrets.API_URL || 'https://petroll-api-834040996278.europe-north1.run.app/api/v1' }}

      - name: Build AAB
        working-directory: app
        run: |
          flutter build appbundle --release \
            --dart-define=API_BASE_URL=${{ secrets.API_URL || 'https://petroll-api-834040996278.europe-north1.run.app/api/v1' }}

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: app/build/app/outputs/flutter-apk/app-release.apk

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-aab
          path: app/build/app/outputs/bundle/release/app-release.aab
