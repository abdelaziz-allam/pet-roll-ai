name: Deploy Landing Page

on:
  push:
    branches: [main]
    paths: ['monorepo/landing/**']
  pull_request:
    paths: ['monorepo/landing/**']

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: monorepo/landing/package-lock.json

      - name: Install dependencies
        working-directory: monorepo/landing
        run: npm ci

      - name: Lint
        working-directory: monorepo/landing
        run: npm run lint

      - name: Build
        working-directory: monorepo/landing
        run: npm run build

  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: monorepo/landing/package-lock.json

      - name: Install dependencies
        working-directory: monorepo/landing
        run: npm ci

      - name: Build
        working-directory: monorepo/landing
        run: npm run build

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          channelId: live
          projectId: petroll-production
          entryPoint: monorepo/landing
