name: Flutter Build & Test

on:
  push:
    branches: [main, develop]
    paths: ["monorepo/app/**", ".github/workflows/mobile-ci.yml"]
  pull_request:
    paths: ["monorepo/app/**", ".github/workflows/mobile-ci.yml"]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.x'
          channel: 'stable'

      - name: Install dependencies
        working-directory: monorepo/app
        run: flutter pub get

      - name: Analyze
        working-directory: monorepo/app
        run: flutter analyze --no-fatal-infos || true

      - name: Run tests
        working-directory: monorepo/app
        run: flutter test || true

  build-android:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.x'
          channel: 'stable'

      - name: Install dependencies
        working-directory: monorepo/app
        run: flutter pub get

      - name: Build APK (debug)
        working-directory: monorepo/app
        run: flutter build apk --debug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: petroll-debug-apk
          path: monorepo/app/build/app/outputs/flutter-apk/app-debug.apk
