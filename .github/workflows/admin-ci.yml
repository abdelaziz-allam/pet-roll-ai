name: Admin Portal CI/CD

on:
  push:
    branches: [main]
    paths: ['monorepo/admin/**', 'monorepo/docker/Dockerfile.admin', '.github/workflows/admin-ci.yml']
  pull_request:
    branches: [main]
    paths: ['monorepo/admin/**']
  workflow_dispatch:

env:
  PROJECT_ID: petroll-production
  REGION: europe-north1
  SERVICE_NAME: petroll-admin
  REGISTRY: europe-north1-docker.pkg.dev/petroll-production/petroll-images
  WIF_PROVIDER: projects/834040996278/locations/global/workloadIdentityPools/github-pool/providers/github-provider
  SERVICE_ACCOUNT: github-actions-deploy@petroll-production.iam.gserviceaccount.com

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: monorepo/admin/package-lock.json

      - name: Install dependencies
        working-directory: monorepo/admin
        run: npm ci

      - name: Type check
        working-directory: monorepo/admin
        run: npx tsc --noEmit || true

      - name: Build
        working-directory: monorepo/admin
        run: npm run build || true

  build-and-push:
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: ${{ env.SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build and Push Docker image
        working-directory: monorepo/admin
        run: |
          IMAGE=${{ env.REGISTRY }}/admin:${{ github.sha }}
          IMAGE_LATEST=${{ env.REGISTRY }}/admin:latest

          API_URL="https://api.petfolioo.com/api/v1"
          echo "Building admin with API_URL=${API_URL}"

          docker build \
            -f ../docker/Dockerfile.admin \
            --target production \
            --build-arg "VITE_API_URL=${API_URL}" \
            -t $IMAGE \
            -t $IMAGE_LATEST \
            .

          docker push $IMAGE
          docker push $IMAGE_LATEST

  deploy:
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    needs: build-and-push
    permissions:
      contents: read
      id-token: write
    environment: production

    steps:
      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: ${{ env.SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.SERVICE_NAME }} \
            --image ${{ env.REGISTRY }}/admin:${{ github.sha }} \
            --region ${{ env.REGION }} \
            --platform managed \
            --allow-unauthenticated \
            --port 80 \
            --min-instances 0 \
            --max-instances 1 \
            --memory 256Mi \
            --cpu 1 \
            --timeout 30 \
            --cpu-throttling \
            --quiet

      - name: Output Service URL
        run: |
          URL=$(gcloud run services describe ${{ env.SERVICE_NAME }} --region ${{ env.REGION }} --format='value(status.url)')
          echo "Admin Portal deployed to: $URL"
