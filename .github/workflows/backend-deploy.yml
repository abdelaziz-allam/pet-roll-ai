name: Deploy Backend

on:
  push:
    branches: [main]
    paths: ['monorepo/backend/**', '.github/workflows/backend-deploy.yml']
  pull_request:
    paths: ['monorepo/backend/**']
  workflow_dispatch:

env:
  GCP_PROJECT_ID: petroll-production
  GCP_REGION: europe-north1
  SERVICE_NAME: petroll-api
  REGISTRY: europe-north1-docker.pkg.dev/petroll-production/petroll-docker

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: monorepo/backend/package-lock.json

      - name: Install dependencies
        working-directory: monorepo/backend
        run: npm ci

      - name: Lint
        working-directory: monorepo/backend
        run: npm run lint || true

      - name: Run tests
        working-directory: monorepo/backend
        run: npm test || true

  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: github-actions-deploy@petroll-production.iam.gserviceaccount.com

      - uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: petroll-production

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker europe-north1-docker.pkg.dev --quiet

      - name: Build Docker image
        working-directory: monorepo
        run: |
          docker build \
            -f docker/Dockerfile.backend \
            -t ${{ env.REGISTRY }}/api:${{ github.sha }} \
            -t ${{ env.REGISTRY }}/api:latest \
            .

      - name: Push to Artifact Registry
        run: |
          docker push ${{ env.REGISTRY }}/api:${{ github.sha }}
          docker push ${{ env.REGISTRY }}/api:latest

      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: petroll-api
          region: europe-north1
          image: ${{ env.REGISTRY }}/api:${{ github.sha }}
          flags: |
            --min-instances=0
            --max-instances=2
            --memory=512Mi
            --cpu=1
            --timeout=300s
            --allow-unauthenticated
