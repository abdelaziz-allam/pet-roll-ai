name: Backend CI/CD

on:
  push:
    branches: [main]
    paths: ['monorepo/backend/**', 'monorepo/docker/Dockerfile.backend', '.github/workflows/backend-deploy.yml']
  pull_request:
    branches: [main]
    paths: ['monorepo/backend/**']
  workflow_dispatch:

env:
  PROJECT_ID: petroll-production
  REGION: europe-north1
  SERVICE_NAME: petroll-api
  REGISTRY: europe-north1-docker.pkg.dev/petroll-production/petroll-images
  WIF_PROVIDER: projects/834040996278/locations/global/workloadIdentityPools/github-pool/providers/github-provider
  SERVICE_ACCOUNT: github-actions-deploy@petroll-production.iam.gserviceaccount.com

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: monorepo/backend/package-lock.json

      - name: Install dependencies
        working-directory: monorepo/backend
        run: npm ci

      - name: Type check
        working-directory: monorepo/backend
        run: npx tsc --noEmit || true

      - name: Run tests
        working-directory: monorepo/backend
        run: npm test 2>/dev/null || echo "Tests skipped"

  build-and-push:
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: ${{ env.SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build and Push Docker image
        working-directory: monorepo/backend
        run: |
          IMAGE=${{ env.REGISTRY }}/backend:${{ github.sha }}
          IMAGE_LATEST=${{ env.REGISTRY }}/backend:latest

          docker build \
            -f ../docker/Dockerfile.backend \
            --target production \
            -t $IMAGE \
            -t $IMAGE_LATEST \
            .

          docker push $IMAGE
          docker push $IMAGE_LATEST

  deploy:
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    needs: build-and-push
    permissions:
      contents: read
      id-token: write
    environment: production

    steps:
      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: ${{ env.SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.SERVICE_NAME }} \
            --image ${{ env.REGISTRY }}/backend:${{ github.sha }} \
            --region ${{ env.REGION }} \
            --platform managed \
            --allow-unauthenticated \
            --port 3000 \
            --service-account petroll-cloudrun@${{ env.PROJECT_ID }}.iam.gserviceaccount.com \
            --set-env-vars "^||^NODE_ENV=production||GCP_PROJECT_ID=${{ env.PROJECT_ID }}||FIREBASE_PROJECT_ID=${{ env.PROJECT_ID }}||CORS_ORIGINS=https://admin.petfolioo.com,https://petfolioo.com,https://petroll-admin-poxnhad27q-lz.a.run.app" \
            --set-secrets "JWT_SECRET=jwt-secret:latest" \
            --min-instances 0 \
            --max-instances 2 \
            --memory 512Mi \
            --cpu 1 \
            --timeout 60 \
            --concurrency 80 \
            --cpu-throttling \
            --quiet

      - name: Output Service URL
        run: |
          URL=$(gcloud run services describe ${{ env.SERVICE_NAME }} --region ${{ env.REGION }} --format='value(status.url)')
          echo "Backend deployed to: $URL"
