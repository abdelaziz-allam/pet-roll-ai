name: Landing Page CI/CD

on:
  push:
    branches: [main]
    paths: ['monorepo/landing/**', '.github/workflows/landing-ci.yml']
  pull_request:
    branches: [main]
    paths: ['monorepo/landing/**']
  workflow_dispatch:

env:
  PROJECT_ID: petroll-production
  REGION: europe-north1
  SERVICE_NAME: petroll-landing
  REGISTRY: europe-north1-docker.pkg.dev/petroll-production/petroll-images
  WIF_PROVIDER: projects/834040996278/locations/global/workloadIdentityPools/github-pool/providers/github-provider
  SERVICE_ACCOUNT: github-actions-deploy@petroll-production.iam.gserviceaccount.com

jobs:
  build-and-deploy:
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    environment: production

    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: ${{ env.SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Create Dockerfile and nginx config
        working-directory: monorepo/landing
        run: |
          cat > Dockerfile << 'DOCKERFILE'
          FROM node:20-slim AS build
          WORKDIR /app
          COPY package.json package-lock.json* ./
          RUN npm ci
          COPY . .
          RUN npm run build

          FROM nginx:alpine
          COPY --from=build /app/dist /usr/share/nginx/html
          COPY nginx.conf /etc/nginx/conf.d/default.conf
          EXPOSE 80
          CMD ["nginx", "-g", "daemon off;"]
          DOCKERFILE

          cat > nginx.conf << 'NGINX'
          server {
              listen 80;
              server_name _;
              root /usr/share/nginx/html;
              index index.html;
              location / {
                  try_files $uri $uri/ /index.html;
              }
              gzip on;
              gzip_types text/plain text/css application/json application/javascript text/xml;
          }
          NGINX

      - name: Build and Push
        working-directory: monorepo/landing
        run: |
          IMAGE=${{ env.REGISTRY }}/landing:${{ github.sha }}
          docker build -t $IMAGE -t ${{ env.REGISTRY }}/landing:latest .
          docker push $IMAGE
          docker push ${{ env.REGISTRY }}/landing:latest

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.SERVICE_NAME }} \
            --image ${{ env.REGISTRY }}/landing:${{ github.sha }} \
            --region ${{ env.REGION }} \
            --platform managed \
            --allow-unauthenticated \
            --port 80 \
            --min-instances 0 \
            --max-instances 1 \
            --memory 128Mi \
            --cpu 1 \
            --cpu-throttling \
            --quiet

      - name: Output Service URL
        run: |
          URL=$(gcloud run services describe ${{ env.SERVICE_NAME }} --region ${{ env.REGION }} --format='value(status.url)')
          echo "Landing Page deployed to: $URL"
